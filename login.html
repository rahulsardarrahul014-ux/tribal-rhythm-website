<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Basic -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TribalRhythm Login</title>

    <!-- SEO -->
    <meta name="description"
        content="Login to TribalRhythm dance studio platform for student access, events, competitions, and updates.">

    <meta name="keywords" content="TribalRhythm, Dance Studio, Login, Dance Competition, Student Portal">

    <meta name="author" content="TribalRhythm">

    <!-- Theme Color -->
    <meta name="theme-color" content="#0b0b0b">

    <!-- Open Graph (Social Share) -->
    <meta property="og:title" content="TribalRhythm Login">
    <meta property="og:description" content="Access your TribalRhythm dance studio account.">
    <meta property="og:type" content="website">

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* 🌌 BODY */
        body {
            margin: 0;
            min-height: 100vh;
            /* 🔥 important */
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Arial;
            background: linear-gradient(135deg, #000814, #001d3d, #003566);

            overflow-y: auto;
            /* ✅ scroll allow */
            padding: 20px 0;
            /* ✅ top-bottom spacing */
        }

        /* 🌟 BACKGROUND GLOW */
        body::before {
            content: "";
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 215, 0, 0.2), transparent);
            top: -100px;
            left: -100px;
            filter: blur(80px);
            animation: moveGlow 10s infinite alternate;
        }

        @keyframes moveGlow {
            0% {
                transform: translate(0, 0);
            }

            100% {
                transform: translate(200px, 200px);
            }
        }

        /* 💎 CARD */
        .card-box {
            width: 380px;
            padding: 30px;
            border-radius: 22px;
            max-height: 90vh;
            /* 🔥 screen ke andar fit */
            overflow-y: auto;

            /* 🔥 FIXED GRADIENT */
            /* background: linear-gradient(135deg, #FFD700, #1E90FF); */

            color: white;
            text-align: center;
            position: relative;

            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);

            /* 💎 CLEAN SHADOW */
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);

            transition: 0.4s;
        }

        .card-box::-webkit-scrollbar {
            width: 5px;
        }

        .card-box::-webkit-scrollbar-thumb {
            background: gold;
            border-radius: 10px;
        }

        .card-box {
            background: linear-gradient(135deg,
                    rgba(255, 215, 0, 0.85),
                    rgba(30, 144, 255, 0.85));
        }

        /* 🔥 GLOW BORDER (BEHIND CONTENT) */


        @keyframes borderGlow {
            0% {
                background-position: 0%
            }

            100% {
                background-position: 300%
            }
        }

        /* 💡 SHINE EFFECT (BEHIND CONTENT) */


        .card-box:hover::after {
            left: 100%;
            transition: 0.7s;
        }

        /* 🚀 HOVER */
        .card-box:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.6),
                0 0 35px rgba(255, 215, 0, 0.8);
        }

        /* ✅ CONTENT ABOVE EFFECTS */
        .card-box * {
            position: relative;
            z-index: 2;
        }

        /* 🖼 LOGO (FIXED) */
        .logo {
            width: 70px;
            display: block;
            margin: 0 auto 10px;
        }

        /* 📝 INPUT */
        input,
        select {
            width: 100%;
            padding: 13px;
            margin-top: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.1);
            color: white;
            outline: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(6px);
            caret-color: #FFD700;
        }

        select option {
            background: #001d3d;
            color: #FFD700;
            /* 🔥 golden text */
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        /* ✨ INPUT FOCUS */
        input:focus,
        select:focus {
            border-color: #FFD700;
            box-shadow: 0 0 12px rgba(255, 215, 0, 0.7),
                0 0 25px rgba(255, 215, 0, 0.4);
            background: rgba(255, 255, 255, 0.15);
            transform: scale(1.03);
        }

        /* 🎯 HOVER */
        input:hover,
        select:hover {
            border-color: #FFD700;
        }

        /* 🔘 BUTTON */
        button {
            width: 100%;
            padding: 13px;
            margin-top: 14px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
            cursor: pointer;

            background: linear-gradient(135deg, #FFD700, #FFC107);
            color: #222;

            box-shadow: 0 5px 15px rgba(255, 193, 7, 0.5);
            transition: all 0.3s ease;
        }

        /* 🚀 BUTTON HOVER */
        button:hover {
            transform: translateY(-3px) scale(1.03);
            background: linear-gradient(135deg, #FFC107, #FFD700);
            box-shadow: 0 8px 25px rgba(255, 193, 7, 0.7);
        }

        /* 💫 CLICK */
        button:active {
            transform: scale(0.96);
        }

        /* 🎨 VARIANTS */
        .otp-btn {
            background: linear-gradient(135deg, #FFD700, #FFB300);
        }

        .verify-btn {
            background: linear-gradient(135deg, #E6C200, #FFD700);
        }

        .resend {
            background: linear-gradient(135deg, #D4AF37, #FFC107);
        }

        /* 📱 MOBILE */
        @media (max-width: 420px) {
            .card-box {
                width: 90%;
                padding: 25px;
            }

            .logo {
                width: 60px;
            }
        }

        input[type="date"] {
            color: white;
        }

        #otp {
            display: none;
        }

        .verify-btn {
            display: none;
        }

        .otp-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 10px;
        }

        .otp-container input {
            width: 45px;
            height: 50px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="card-box">

        <img src="tribalweblogo.png" class="logo">
        <h4>Welcome to TribalRhythm</h4>

        <input id="name" placeholder="Full Name">
        <input id="age" placeholder="Age">
        <input id="dob" type="date">
        <input id="mobile" placeholder="Mobile Number">

        <button class="otp-btn mt-2" onclick="sendPhoneOTP()">
            📱 Send Phone OTP
        </button>

        <div id="phoneOtpBox" class="otp-container" style="display:none;">
            <input maxlength="1" class="phone-otp">
            <input maxlength="1" class="phone-otp">
            <input maxlength="1" class="phone-otp">
            <input maxlength="1" class="phone-otp">
            <input maxlength="1" class="phone-otp">
            <input maxlength="1" class="phone-otp">
        </div>
        <div style="margin-top:10px;">
            <span id="phoneTimerText" style="color:red;">(60)</span>
            <a href="javascript:void(0)" id="phoneResendBtn" onclick="sendPhoneOTP()" style="color:gold;">
                Resend Phone OTP
            </a>
        </div>

        <button id="phoneVerifyBtn" class="verify-btn" onclick="verifyPhoneOTP()" style="display:none;">
            ✔ Verify Phone OTP </button>

        <input id="email" placeholder="Email">

        <button class="otp-btn mt-2" onclick="sendOTP()">
            📧 Send Email OTP
        </button>
        <div style="margin-top:10px;">
            <span id="emailTimerText" style="color:red;">(60)</span>
            <a href="javascript:void(0)" id="emailResendBtn" onclick="sendOTP()" style="color:gold;">
                Resend Email OTP
            </a>
        </div>

        <div id="emailOtpBox" class="otp-container" style="display:none;">
            <input maxlength="1" class="email-otp">
            <input maxlength="1" class="email-otp">
            <input maxlength="1" class="email-otp">
            <input maxlength="1" class="email-otp">
            <input maxlength="1" class="email-otp">
            <input maxlength="1" class="email-otp">
        </div>

        <button id="emailVerifyBtn" class="verify-btn" onclick="verifyOTP()" style="display:none;">
            ✅ Verify Email OTP </button>

        <button id="editBtn" style="display:none;" onclick="enableEdit()">
            ✏️ Edit Details
        </button>

        <input id="whatsapp" placeholder="Whatsapp Number">


            <label>Enter Pincode</label>
        <div class="otp-container">
            <input maxlength="1" class="pincode">
            <input maxlength="1" class="pincode">
            <input maxlength="1" class="pincode">
            <input maxlength="1" class="pincode">
            <input maxlength="1" class="pincode">
            <input maxlength="1" class="pincode">
        </div>


        <!-- STATE -->
        <select id="state">
            <option value="">Select State</option>
            <option>Andhra Pradesh</option>
            <option>Arunachal Pradesh</option>
            <option>Assam</option>
            <option>Bihar</option>
            <option>Chhattisgarh</option>
            <option>Goa</option>
            <option>Gujarat</option>
            <option>Haryana</option>
            <option>Himachal Pradesh</option>
            <option>Jharkhand</option>
            <option>Karnataka</option>
            <option>Kerala</option>
            <option>Madhya Pradesh</option>
            <option>Maharashtra</option>
            <option>Manipur</option>
            <option>Meghalaya</option>
            <option>Mizoram</option>
            <option>Nagaland</option>
            <option>Odisha</option>
            <option>Punjab</option>
            <option>Rajasthan</option>
            <option>Sikkim</option>
            <option>Tamil Nadu</option>
            <option>Telangana</option>
            <option>Tripura</option>
            <option>Uttar Pradesh</option>
            <option>Uttarakhand</option>
            <option>West Bengal</option>
            <option>Delhi</option>
            <option>Puducherry</option>
            <option>Chandigarh</option>
            <option>Andaman & Nicobar</option>
            <option>Ladakh</option>
            <option>Lakshadweep</option>
        </select>

        <!-- LANGUAGE -->
        <select id="language">
            <option value="">Select Language</option>
            <option>Bhumij</option>
            <option>Santali</option>
        </select>

        <!-- RULES -->
        <div class="form-check mt-2 text-start">
            <input class="form-check-input" type="checkbox" id="rulesCheck">
            <label class="form-check-label">
                I agree to
                <a href="rules.html" target="_blank" style="color:yellow;">Rules & Regulations</a>
            </label>
        </div>

        <div id="recaptcha-container"></div>




    </div>

    <!-- EMAIL JS -->
    <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

    <script type="module">

        let emailTime = 60;
        let phoneTime = 60;
        let emailInterval;
        let phoneInterval;
        let emailVerified = false;
        let phoneVerified = false;

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import {
            getAuth,
            RecaptchaVerifier,
            signInWithPhoneNumber
        } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        // 🔥 FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDeXDwM5_DASJCYqefJbQ-u_B-g1MTPjXM",
            authDomain: "tribalrhythm-486bd.firebaseapp.com",
            projectId: "tribalrhythm-486bd",
            storageBucket: "tribalrhythm-486bd.firebasestorage.app",
            messagingSenderId: "566528037279",
            appId: "1:566528037279:web:b475312ea2c721d4fd2daa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);


        // 🔥 CHECK EXISTING USER (by email or mobile)
        window.checkExistingUser = async function (email) {
            const docRef = doc(db, "users", email);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                return docSnap.data();
            } else {
                return null;
            }
        };


        function startEmailTimer() {
            clearInterval(emailInterval);
            emailTime = 60;

            document.getElementById("emailResendBtn").style.pointerEvents = "none";

            emailInterval = setInterval(() => {
                emailTime--;

                document.getElementById("emailTimerText").innerText = `(${emailTime})`;

                if (emailTime <= 0) {
                    clearInterval(emailInterval);
                    document.getElementById("emailResendBtn").style.pointerEvents = "auto";
                    document.getElementById("emailTimerText").innerText = "(0)";

                }
            }, 1000);
        }


        function startPhoneTimer() {
            clearInterval(phoneInterval);
            phoneTime = 60;

            document.getElementById("phoneResendBtn").style.pointerEvents = "none";

            phoneInterval = setInterval(() => {
                phoneTime--;

                document.getElementById("phoneTimerText").innerText = `(${phoneTime})`;

                if (phoneTime <= 0) {
                    clearInterval(phoneInterval);
                    document.getElementById("phoneResendBtn").style.pointerEvents = "auto";
                    document.getElementById("phoneTimerText").innerText = "(0)";
                }
            }, 1000);
        }

        window.recaptchaVerifier = new RecaptchaVerifier(
            auth,
            "recaptcha-container",
            {
                size: "normal"
            }
        );

        const setupOTPBoxes = () => {

            document.querySelectorAll('.email-otp,.phone-otp,.pincode'
            ).forEach((box, index, arr) => {

                box.addEventListener('input', () => {

                    if (
                        box.value.length === 1 &&
                        index < arr.length - 1
                    ) {
                        arr[index + 1].focus();
                    }

                });

            });

        };

        document.getElementById("email").addEventListener("blur", async function () {
            let email = this.value.trim();
            if (!email) return;

            let userData = await checkExistingUser(email);

            if (userData) {
                Swal.fire("Welcome Back", "User already registered", "success");

                // AUTO FILL
                document.getElementById("name").value = userData.name;
                document.getElementById("age").value = userData.age;
                document.getElementById("dob").value = userData.dob;
                document.getElementById("mobile").value = userData.mobile;
                document.getElementById("whatsapp").value = userData.whatsapp;
                document.getElementById("state").value = userData.state;
                document.getElementById("language").value = userData.language;

                // SHOW EDIT BUTTON
                document.getElementById("editBtn").style.display = "block";
            }
        });

        setTimeout(setupOTPBoxes, 500);


        // 🔥 EMAILJS INIT
        (function () {
            emailjs.init("FYCnHXj3AQZc52uq6"); // paste public key
        })();

        // 🔐 OTP VARIABLES
        let generatedOTP = "";
        let otpExpireTime = 0;
        let time = 60;
        let interval;

        // ⏱ TIMER


        // 📧 SEND EMAIL OTP
        window.sendOTP = async function () {

            let name = document.getElementById("name").value;
            let age = document.getElementById("age").value;
            let dob = document.getElementById("dob").value;
            let mobile = document.getElementById("mobile").value;
            let email = document.getElementById("email").value.trim();
            let state = document.getElementById("state").value;
            let language = document.getElementById("language").value;
            let rules = document.getElementById("rulesCheck").checked;

            // 🔥 validation first
            if (!name || !age || !dob || !mobile || !email || !state || !language) {
                Swal.fire("Tribal Rhythm", "Please fill all details", "warning");
                return;
            }

            if (!rules) {
                Swal.fire("Tribal Rhythm", "Please accept Rules & Regulations", "warning");
                return;
            }

            // 🔥 duplicate check
            let existing = await checkExistingUser(email);

            if (existing) {
                Swal.fire("Already Registered", "You cannot register again", "error");

                // auto fill
                document.getElementById("name").value = existing.name;
                document.getElementById("age").value = existing.age;
                document.getElementById("dob").value = existing.dob;
                document.getElementById("mobile").value = existing.mobile;
                document.getElementById("whatsapp").value = existing.whatsapp;
                document.getElementById("state").value = existing.state;
                document.getElementById("language").value = existing.language;

                document.getElementById("editBtn").style.display = "block";

                return;
            }

            // OTP generate
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            otpExpireTime = Date.now() + 60000;

            emailjs.send("service_ynim8tv", "template_87yxux8", {
                name,
                email,
                otp: generatedOTP
            })
                .then(() => {
                    Swal.fire("Tribal Rhythm", "OTP sent to Email", "success");
                    startEmailTimer();

                    document.getElementById("emailOtpBox").style.display = "flex";
                    document.getElementById("emailVerifyBtn").style.display = "block";
                })
                .catch(() => {
                    Swal.fire("Tribal Rhythm", "Failed to send OTP", "error");
                });
        };



        // ✅ VERIFY EMAIL OTP
        window.verifyOTP = async function () {

            let otp = "";

            document.querySelectorAll(".email-otp")
                .forEach(input => {
                    otp += input.value;
                });

            if (otp.length !== 6) {
                Swal.fire("Error", "Enter full OTP", "warning");
                return;
            }

            if (Date.now() > otpExpireTime) {

                Swal.fire(
                    "Tribal Rhythm",
                    "OTP Expired",
                    "error"
                );

                return;
            }

            if (otp !== generatedOTP) {

                Swal.fire(
                    "Tribal Rhythm",
                    "Wrong OTP",
                    "error"
                );

                return;
            }

            try {

                let name = document.getElementById("name").value.trim();
                let age = document.getElementById("age").value.trim();
                let dob = document.getElementById("dob").value.trim();
                let mobile = document.getElementById("mobile").value.trim();
                let whatsapp = document.getElementById("whatsapp").value.trim();
                let email = document.getElementById("email").value.trim();
                let state = document.getElementById("state").value.trim();
                let language = document.getElementById("language").value.trim();
                let pincode = "";
                document.querySelectorAll(".pincode").forEach(i => pincode += i.value);

                await setDoc(doc(db, "users", email), {
                    name,
                    age,
                    dob,
                    mobile,
                    whatsapp,
                    email,
                    state,
                    pincode,
                    language,
                    status: "pending",
                    createdAt: new Date()
                });

                await emailjs.send(
                    "service_ynim8tv",
                    "template_56i8whi",
                    {
                        name,
                        email
                    }
                );

                localStorage.setItem("email", email);

                emailVerified = true;

                checkFinalSuccess();

                Swal.fire({
                    title: "Welcome to Tribal Rhythm 🎉",
                    text: "Registration Successful",
                    icon: "success"
                }).then(() => {
                    window.location.href = "index.html";
                });

            } catch (error) {

                console.log(error);

                Swal.fire(
                    "Firebase Error",
                    error.message,
                    "error"
                );
            }
        };

        // 📱 SEND PHONE OTP
        window.sendPhoneOTP = async function () {

            let mobile =
                document.getElementById("mobile").value;

            if (mobile.length !== 10) {

                Swal.fire(
                    "Tribal Rhythm",
                    "Enter valid mobile number",
                    "warning"
                );

                return;
            }

            const phoneNumber = "+91" + mobile;

            try {

                const confirmationResult =
                    await signInWithPhoneNumber(
                        auth,
                        phoneNumber,
                        window.recaptchaVerifier
                    );

                window.confirmationResult =
                    confirmationResult;

                document.getElementById(
                    "phoneOtpBox"
                ).style.display = "flex";

                document.getElementById(
                    "phoneVerifyBtn"
                ).style.display = "block";


                Swal.fire(
                    "Success",
                    "OTP Sent To Mobile",
                    "success"
                );

                startPhoneTimer();

            } catch (error) {

                console.log(error);

                Swal.fire(
                    "Error",
                    error.message,
                    "error"
                );

            }
        };



        // 📱 VERIFY PHONE OTP
        window.verifyPhoneOTP = async function () {

            let otp = "";

            document.querySelectorAll(".phone-otp").forEach(input => {
                otp += input.value;
            });

            if (otp.length !== 6) {
                Swal.fire("Error", "Enter full OTP", "warning");
                return;
            }

            try {
                await window.confirmationResult.confirm(otp);

                phoneVerified = true;
                document.getElementById("phoneVerifyBtn").disabled = true;
                checkFinalSuccess();

                Swal.fire({
                    title: "Success",
                    text: "Phone Verified Successfully",
                    icon: "success"
                });

                // checkFinalSuccess();

            } catch (error) {
                Swal.fire("Error", "Invalid OTP", "error");
            }
        };

        function checkFinalSuccess() {
            if (emailVerified && phoneVerified) {

                Swal.fire({
                    title: "🎉 Registration Complete",
                    text: "Email + Phone both verified successfully",
                    icon: "success"
                }).then(() => {
                    window.location.href = "index.html";
                });

            }
        }

        window.enableEdit = function () {
            document.querySelectorAll("input, select").forEach(el => {
                el.disabled = false;
            });

            Swal.fire("Edit Mode", "You can now update your details", "info");
        };








    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

</body>

</html>
