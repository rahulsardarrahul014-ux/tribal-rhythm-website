<!DOCTYPE html>
<html lang="en">

<head>

    <!-- BASIC -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tribal Rhythm Dashboard</title>

    <!-- SEO -->
    <meta name="description"
        content="Tribal Rhythm Dashboard for managing dance studio students, attendance, competitions, analytics, and performance reports.">

    <meta name="keywords"
        content="Tribal Rhythm Dashboard, Dance Studio, Student Dashboard, Analytics, Attendance, Event Management">

    <meta name="author" content="Tribal Rhythm">

    <!-- GOOGLE INDEX -->
    <meta name="robots" content="index,follow">

    <!-- THEME -->
    <meta name="theme-color" content="#070707">

    <!-- OPEN GRAPH -->
    <meta property="og:title" content="Tribal Rhythm Dashboard">
    <meta property="og:description" content="Professional dance studio dashboard with analytics and management tools.">
    <meta property="og:type" content="website">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Tribal Rhythm Dashboard">
    <meta name="twitter:description" content="Dance studio management dashboard for Tribal Rhythm.">

    <!-- SECURITY -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- GOOGLE FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CHART JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- PERFORMANCE -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">

    <!-- STYLE -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #070707;
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.05);
        }

        .main {
            padding: 20px;
        }

        .stat {
            font-size: 22px;
            font-weight: bold;
        }

        .gold {
            color: gold;
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 10px;
        }

        /* MOBILE */
        @media(max-width:768px) {
            .main {
                padding: 10px;
            }

            .stat {
                font-size: 18px;
            }
        }
    </style>

</head>

<body>

    <div class="container main">

        <h3>👑 Tribal Rhythm Live Dashboard</h3>

        <div class="row g-3 mt-2">

            <div class="col-md-4">
                <div class="glass">👥 Users <div class="stat" id="users">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass">🎟️ Tickets <div class="stat" id="tickets">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass">💰 Revenue ₹<span id="revenue">0</span></div>
            </div>

        </div>

        <div class="glass mt-3">
            <h5>📈 Live Analytics</h5>
            <canvas id="chart"></canvas>
        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeXDwM5_DASJCYqefJbQ-u_B-g1MTPjXM",
            authDomain: "tribalrhythm-486bd.firebaseapp.com",
            projectId: "tribalrhythm-486bd",
            storageBucket: "tribalrhythm-486bd.firebasestorage.app",
            messagingSenderId: "566528037279",
            appId: "1:566528037279:web:b475312ea2c721d4fd2daa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* USERS */
        onSnapshot(collection(db, "users"), snap => {
            document.getElementById("users").innerText = snap.size;
            updateChart(snap.size);
        });

        onSnapshot(collection(db, "participants"), snap => {
            document.getElementById("tickets").innerText = snap.size;
        });

        onSnapshot(collection(db, "participants"), snap => {

            let total = 0;

            snap.forEach(d => {
                total += Number(d.data().fee || 0);
            });

            document.getElementById("revenue").innerText = total;

        });

        /* CHART */
        let chart;

        function updateChart(v) {

            if (!chart) {

                chart = new Chart(
                    document.getElementById("chart"),
                    {
                        type: "line",

                        data: {
                            labels: ["Users"],

                            datasets: [{
                                label: "Live Users",
                                data: [v],
                                borderColor: "gold",
                                tension: 0.4
                            }]
                        },

                        options: {
                            responsive: true
                        }
                    }
                );

            } else {

                chart.data.datasets[0].data = [v];
                chart.update();

            }
        }
        setTimeout(() => {
            location.reload();
        }, 60000);

    </script>

</body>

</html>
