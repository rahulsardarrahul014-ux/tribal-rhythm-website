<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Tribal Rhythm Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            background: #070707;
            color: white;
            font-family: Poppins;
        }

        .glass {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 16px;
        }

        .main {
            padding: 20px;
        }

        .stat {
            font-size: 22px;
            font-weight: bold;
        }

        .gold {
            color: gold;
        }
    </style>
</head>

<body>

    <div class="container main">

        <h3>👑 Tribal Rhythm Live Dashboard</h3>

        <div class="row g-3 mt-2">

            <div class="col-md-4">
                <div class="glass">👥 Users <div class="stat" id="users">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass">🎟️ Tickets <div class="stat" id="tickets">0</div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="glass">💰 Revenue ₹<span id="revenue">0</span></div>
            </div>

        </div>

        <div class="glass mt-3">
            <h5>📈 Live Analytics</h5>
            <canvas id="chart"></canvas>
        </div>

    </div>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot }
            from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeXDwM5_DASJCYqefJbQ-u_B-g1MTPjXM",
            authDomain: "tribalrhythm-486bd.firebaseapp.com",
            projectId: "tribalrhythm-486bd",
            storageBucket: "tribalrhythm-486bd.appspot.com",
            messagingSenderId: "566528037279",
            appId: "1:566528037279:web:b475312ea2c721d4fd2daa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* USERS */
        onSnapshot(collection(db, "bookings"), snap => {
            users.innerText = snap.size;
            updateChart(snap.size);
        });

        /* TICKETS */
        onSnapshot(collection(db, "tickets"), snap => {
            tickets.innerText = snap.size;
        });

        /* REVENUE */
        onSnapshot(collection(db, "payments"), snap => {
            let total = 0;
            snap.forEach(d => total += Number(d.data().amount || 0));
            revenue.innerText = total;
        });

        /* CHART */
        let chart;
        function updateChart(v) {
            if (!chart) {
                chart = new Chart(document.getElementById("chart"), {
                    type: "line",
                    data: {
                        labels: ["Live"],
                        datasets: [{
                            label: "Users",
                            data: [v],
                            borderColor: "gold"
                        }]
                    }
                });
            } else {
                chart.data.datasets[0].data.push(v);
                chart.update();
            }
        }

    </script>

</body>

</html>
