<!DOCTYPE html>
<html>

<head>
  <title>Success</title>

  <style>
    body {
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: Arial;
    }

    .box {
      text-align: center;
      padding: 30px;
      background: #1f1f1f;
      border-radius: 15px;
      box-shadow: 0 0 20px green;
    }

    h1 {
      color: lightgreen;
    }

    p {
      margin: 8px 0;
    }
  </style>

</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <div class="box">
    <h1>🎉 Payment Successful</h1>

    <p id="pid"></p>
    <p id="reg"></p>
    <p id="pass"></p>
    <canvas id="qrcode"></canvas>

    <br><br>

    <button onclick="downloadPass()">⬇ Download Pass</button>

  </div>


  <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

  <script>
    const urlParams = new URLSearchParams(window.location.search);

    let payment = urlParams.get("payment_id");
    let reg = urlParams.get("reg_id");
    let pass = urlParams.get("pass");

    document.getElementById("pid").innerText = "Payment ID: " + payment;
    document.getElementById("reg").innerText = "Registration ID: " + reg;
    document.getElementById("pass").innerText = "Entry Password: " + pass;

    let qrData = `
Tribal Rhythm Entry Pass
Reg ID: ${reg}
Password: ${pass}
Payment: ${payment}
`;

    QRCode.toCanvas(document.getElementById("qrcode"), qrData);
  </script>

  <script>
    function downloadPass() {

      let canvas = document.getElementById("qrcode");

      let link = document.createElement("a");
      link.download = "TribalPass.png";
      link.href = canvas.toDataURL();
      link.click();
    }
  </script>

</body>

</html>
