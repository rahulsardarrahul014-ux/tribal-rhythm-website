<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tribal Rhythm Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #0b0b0b, #111827);
            color: white;
            font-family: Poppins;
        }

        .header {
            text-align: center;
            padding: 20px;
            border-bottom: 2px solid gold;
        }

        .section {
            margin-top: 25px;
            border-radius: 18px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid gold;
            backdrop-filter: blur(10px);
        }

        .section-header {
            background: linear-gradient(135deg, gold, orange);
            color: black;
            padding: 12px;
            font-weight: bold;
            border-radius: 12px 12px 0 0;
        }

        .section-body {
            padding: 20px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgb(167, 5, 5);
        }

        button {
            width: 100%;
            padding: 12px;
            background: gold;
            border: none;
            border-radius: 10px;
            font-weight: bold;
        }

        button:hover {
            background: orange;
        }
    </style>

</head>

<body>

    <div class="header">
        <h2>🏹 TRIBAL RHYTHM REGISTRATION</h2>
        <p>Wel Come To Tribal Rhythm Registration Form</p>
        <p>See ruls before register</p>
    </div>

    <div class="container">

        <!-- 🏹 BHUMIJ FORM -->
        <div class="section">

            <div class="section-header">
                🏹 Bhumij Competition Registration
            </div>

            <div class="section-body">

                <form id="bForm">

                    <input id="bname" placeholder="Full Name" required>
                    <input placeholder="Father / Guardian Name" required>
                    <input type="number" placeholder="Age" required>

                    <select required>
                        <option value="">Select Gender</option>
                        <option>Male</option>
                        <option>Female</option>
                        <option>Other</option>
                    </select>

                    <input id="bmobile" placeholder="Mobile Number" required>
                    <input id="bemail" placeholder="Email ID" required>

                    <textarea placeholder="Address (Village, District, State)" required></textarea>

                    <input id="ticket" placeholder="Ticket ID" disabled>

                    <select required>
                        <option value="">Select Tribe</option>
                        <option>Bhumij</option>
                        <option>Santali</option>
                        <option>Ho</option>
                        <option>Munda</option>
                        <option>Others</option>
                    </select>



                    <button type="submit" id="btn">Pay ₹300 & Register</button>

                </form>

            </div>

        </div>

    </div>

    <!-- FIREBASE + RAZORPAY -->
    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeXDwM5_DASJCYqefJbQ-u_B-g1MTPjXM",
            authDomain: "tribalrhythm-486bd.firebaseapp.com",
            projectId: "tribalrhythm-486bd",
            storageBucket: "tribalrhythm-486bd.appspot.com",
            messagingSenderId: "566528037279",
            appId: "1:566528037279:web:b475312ea2c721d4fd2daa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        /* 🎫 TICKET GENERATOR */
        function genTicket() {
            return "TR-" + Math.floor(100000 + Math.random() * 900000);
        }
        window.addEventListener("DOMContentLoaded", () => {
            let ticket = genTicket();
            document.getElementById("ticket").value = ticket;
        });

        /* 💳 PAYMENT + REGISTER */
        document.getElementById("bForm").addEventListener("submit", async function (e) {
            e.preventDefault();

            // ✅ pehle values lo
            let name = document.getElementById("bname").value;
            let email = document.getElementById("bemail").value;
            let mobile = document.getElementById("bmobile").value;

            let ticket = genTicket();

            // ✅ backend call
            let res = await fetch("https://tribal-rhythm-backend.onrender.com/create-order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    amount: 300,
                    email: email
                })
            });

            let data = await res.json();

            var options = {
                key: "YOUR_RAZORPAY_KEY_ID",
                amount: data.amount,
                currency: "INR",
                name: "Tribal Rhythm",
                order_id: data.id,

                notes: {
                    email: email
                },

                prefill: {
                    name: name,
                    email: email,
                    contact: mobile
                },

                handler: async function (response) {

                    await setDoc(doc(db, "users", email), {
                        name,
                        email,
                        mobile,
                        payment: true,
                        ticket: ticket,
                        payment_id: response.razorpay_payment_id
                    });

                    alert("Payment Success!");
                    window.location.href = "competition.html";
                }
            };

            var rzp = new Razorpay(options);
            rzp.open();
        });

    </script>

    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

</body>

</html>
