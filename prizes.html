<!DOCTYPE html>
<html lang="en">

<head>

    <!-- BASIC -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Prizes & Certificates | Tribal Rhythm</title>

    <!-- SEO -->
    <meta name="description"
        content="View Tribal Rhythm competition prizes, winner rankings, medals, awards, and downloadable certificates for dance events and competitions.">

    <meta name="keywords"
        content="Tribal Rhythm, Dance Competition, Certificates, Prizes, Awards, Winners, Medals, Dance Event">

    <meta name="author" content="Tribal Rhythm">

    <!-- ROBOTS -->
    <meta name="robots" content="index,follow">

    <!-- THEME -->
    <meta name="theme-color" content="#020617">

    <!-- OPEN GRAPH -->
    <meta property="og:title" content="Prizes & Certificates | Tribal Rhythm">
    <meta property="og:description"
        content="Explore winner prizes, medals, awards, and certificates from Tribal Rhythm dance competitions.">
    <meta property="og:type" content="website">

    <!-- TWITTER -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Prizes & Certificates | Tribal Rhythm">
    <meta name="twitter:description" content="Official Tribal Rhythm certificates and competition rewards page.">

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="logo.png">

    <!-- PERFORMANCE -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="//cdn.jsdelivr.net">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- BOOTSTRAP -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- SECURITY -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <!-- STYLE -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #020617, #111827);
            color: white;
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            transition: 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        #certificateBox {
            overflow: hidden;
            border-radius: 20px;
        }

        .certificate {
            position: relative;
            width: 100%;
            max-width: 700px;
            margin: auto;
        }

        .cert-bg {
            width: 100%;
            height: auto;
            object-fit: cover;
            border-radius: 20px;
        }

        .cert-content {
            position: absolute;
            top: 18%;
            width: 100%;
            text-align: center;
            color: black;
            padding: 20px;
        }

        #certName {
            font-size: 32px;
            font-weight: bold;
        }

        #positionText {
            font-size: 24px;
            margin-top: 10px;
        }

        #medal {
            font-size: 40px;
            margin-top: 10px;
        }

        .winner-box {
            background: linear-gradient(45deg, gold, orange);
            color: black;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
        }

        /* MOBILE */
        @media(max-width:768px) {

            #certName {
                font-size: 22px;
            }

            #positionText {
                font-size: 18px;
            }

            #medal {
                font-size: 28px;
            }

            .card {
                padding: 15px;
            }
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-thumb {
            background: gold;
            border-radius: 10px;
        }
    </style>

</head>

<body>

    <div class="text-center mb-3">
        <a href="admin.html" class="btn btn-warning">⚙️ Admin</a>
        <a href="dashboard.html" class="btn btn-warning">📊 Dashboard</a>
    </div>

    <div class="container">

        <h1>🏆 Tribal Rhythm Prizes & Certificates</h1>

        <div class="winner-box mt-4">
            🎉 Live Winner Auto System 🎉
        </div>

        <div class="card p-4 mt-4 text-center">

            <h4>🧾 Auto Certificates</h4>

            <select id="userSelect" class="form-select mb-3"></select>

            <div id="certificateBox" class="certificate">
                <img src="certificatew.png" class="cert-bg">

                <div class="cert-content">
                    <h2>TRIBAL RHYTHM</h2>

                    <p>This Certificate is Awarded to</p>
                    <h2 id="certName">Loading...</h2>

                    <p id="certCategory">Category</p>

                    <h3 id="positionText">Participant</h3>

                    <div id="medal">🎖️</div>
                </div>
            </div>

            <button onclick="downloadCertificate()" class="btn btn-warning mt-3">
                Download Certificate
            </button>

        </div>

    </div>

    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <script type="module">

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeXDwM5_DASJCYqefJbQ-u_B-g1MTPjXM",
            authDomain: "tribalrhythm-486bd.firebaseapp.com",
            projectId: "tribalrhythm-486bd",
            storageBucket: "tribalrhythm-486bd.firebasestorage.app",
            messagingSenderId: "566528037279",
            appId: "1:566528037279:web:b475312ea2c721d4fd2daa"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let participants = [];

        onSnapshot(collection(db, "scores"), snap => {

            let map = {};

            snap.forEach(d => {
                let s = d.data();

                if (!map[s.category]) map[s.category] = {};
                if (!map[s.category][s.name]) map[s.category][s.name] = 0;

                map[s.category][s.name] += s.score;
            });

            let firstCat = Object.keys(map)[0];
            if (!firstCat) return;

            let arr = [];

            for (let name in map[firstCat]) {
                arr.push({ name, score: map[firstCat][name] });
            }

            arr.sort((a, b) => b.score - a.score);

            participants = arr;

            let select = document.getElementById("userSelect");
            select.innerHTML = "";

            arr.forEach((p, i) => {
                let opt = document.createElement("option");
                opt.value = i;
                opt.textContent = p.name;
                select.appendChild(opt);
            });

            window.currentCategory = firstCat;

            updateCertificate(0, firstCat);
        });

        document.getElementById("userSelect").onchange = (e) => {
            updateCertificate(
                e.target.value,
                window.currentCategory
            );
        };

        function updateCertificate(index, category = "Dance Category") {

            let user = participants[index];
            if (!user) return;

            document.getElementById("certName").innerText = user.name;
            document.getElementById("certCategory").innerText = category;

            let positionText = "Participation Certificate";
            let medal = "🎖️";

            if (index == 0) {
                positionText = "🥇 1st Place (Gold Winner)";
                medal = "🥇";
            } else if (index == 1) {
                positionText = "🥈 2nd Place (Silver Winner)";
                medal = "🥈";
            } else if (index == 2) {
                positionText = "🥉 3rd Place (Bronze Winner)";
                medal = "🥉";
            }

            document.getElementById("positionText").innerText = positionText;
            document.getElementById("medal").innerText = medal;
        }

        window.downloadCertificate = async function () {

            let box =
                document.getElementById("certificateBox");

            const canvas =
                await html2canvas(box, {
                    scale: 2
                });

            let link =
                document.createElement("a");

            link.download =
                "TribalRhythmCertificate.png";

            link.href =
                canvas.toDataURL("image/png");

            link.click();

            // ✅ Selected User
            let selectedIndex =
                document.getElementById("userSelect").value;

            let user = participants[selectedIndex];

            if (!user) return;

            // ✅ Phone fallback
            let phone = user.phone || "";

            // ✅ WhatsApp Message
            let message =
                `🎉 Congratulations ${user.name}!

You have received your certificate in Tribal Rhythm 🏆`;

            // ✅ Open WhatsApp only if phone exists
            if (phone) {

                let whatsappURL =
                    `https://wa.me/${phone}?text=${encodeURIComponent(message)}`;

                window.open(whatsappURL, "_blank");

            }

        }


    </script>

</body>

</html>
